<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | E-Commerce</title>

    <link rel="stylesheet" href="css/register.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>

    <div class="container">

        <div class="left-side">

            <h1>BnIntelHub</h1>

            <h2>Join Our Store</h2>

            <p>Create your account and enjoy premium shopping experience.</p>

            <ul>

                <li><i class="fa fa-check-circle"></i> Secure Shopping</li>

                <li><i class="fa fa-check-circle"></i> Easy Returns</li>

                <li><i class="fa fa-check-circle"></i> Fast Checkout</li>

            </ul>

        </div>

        <div class="right-side">

            <form id="registerForm">

                <h2>Create Account</h2>

                <div class="row">

                    <input type="text" placeholder="First Name" id="firstName">

                    <input type="text" placeholder="Last Name" id="lastName">

                </div>

                <input type="email" placeholder="Email Address" id="email">

                <input type="tel" id="phone" placeholder="Phone Number" maxlength="10" inputmode="numeric">

                <input type="password" placeholder="Password" id="password">

                <input type="password" placeholder="Confirm Password" id="confirmPassword">

                <label class="check">

                    <input type="checkbox" id="terms">

                    I agree to the Terms & Conditions

                </label>

                <button type="submit">

                    Create Account

                </button>

                <p>

                    Already have an account?

                    <a href="login.html">Login</a>

                </p>

            </form>

        </div>

    </div>

    <script src="js/register.js"></script>

</body>

</html>
