<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="title-section">
        <h1>Admission Form</h1>

        <div class="divider">
            <span></span>
            ★
            <span></span>
        </div>

        <p>Application Form for New Admission.</p>
    </div>

    <div class="form-container">

        <form>

            <div class="row">
                <div class="field">
                    <label>Name of Candidate <span>*</span></label>
                    <input type="text">
                </div>

                <div class="field">
                    <label>Select Department / Course <span>*</span></label>
                    <select>
                        <option>-- Please Select --</option>
                        <option value="btech-cse">B.Tech (Computer Science)</option>
                        <option value="btech-me">B.Tech (Mechanical)</option>
                        <option value="btech-ee">B.Tech (Electrical)</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label>Select Gender <span>*</span></label>
                    <select>
                        <option>-- Please Select --</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="field">
                    <label>Are you married or single? <span>*</span></label>
                    <select>
                        <option>-- Select Status --</option>
                        <option value="married">Married</option>
                        <option value="single">Single</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label>Category <span>*</span></label>
                    <select>
                        <option>-- Select Category --</option>  
                        <option value="general">General</option>
                        <option value="obc">OBC</option>
                        <option value="sc/st">SC/ST</option>
                    </select>
                </div>

                <div class="field">
                    <label>Email Id <span>*</span></label>
                    <input type="email" placeholder="Enter Email">
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label>Mobile <span>*</span></label>
                    <select>
                        <option>-- Country Code --</option>
                        <option value="91">+91 (India)</option>
                    </select>
                    <input type="tel" placeholder="10 Digit Mobile Number" maxlength="10">
                </div>

                <div class="field">
                    <label>Alternate Number</label>
                    <select>
                        <option>-- Country Code --</option>
                        <option value="91">+91 (India)</option>
                    </select>
                    <input type="tel" placeholder=" 10 Digit Mobile Number" maxlength="10">
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label>Parents Number</label>
                    <select>
                        <option>-- Country Code --</option>
                        <option value="91">+91 (India)</option>
                    </select>
                    <input type="tel" placeholder="10 Digit Mobile Number" maxlength="10">
                </div>

                <div class="field">
                    <label>Pincode</label>
                    <input type="text">
                </div>
            </div>


            <div class="full-field">
                <label>Permanent Address <span>*</span></label>
                <textarea></textarea>
            </div>

            <div class="full-field">
                <label>Correspondence Address</label>
                <textarea></textarea>
            </div>



            <div class="row">
                <div class="field">
                    <label>Father's/Husband Name <span>*</span></label>
                    <input type="text">
                </div>

                <div class="field">
                    <label>Father's/Husband Occupation</label>
                    <input type="text">
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label>Mother's Name <span>*</span></label>
                    <input type="text">
                </div>

                <div class="field">
                    <label>Place of Birth</label>
                    <input type="text">
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label>Date of Birth <span>*</span></label>
                    <input type="date">
                </div>

                <div class="field">
                    <label>State <span>*</span></label>
                    <input type="text">
                </div>
            </div>



            <h2 class="section-title">Educational Qualification</h2>

            <div class="qualification-table">

                <table>
                    <thead>
                        <tr>
                            <th>Examination Passed</th>
                            <th>University/Board</th>
                            <th>Subject</th>
                            <th>Division & %</th>
                            <th>Year of Passing</th>
                            <th>Result</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr>
                            <td><input type="text" value="10th"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                        </tr>

                        <tr>
                            <td><input type="text" value="12th"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                        </tr>

                        <tr>
                            <td><input type="text" value="Graduate"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                        </tr>

                    </tbody>
                </table>
                <div class="row">

                    <div class="field">
                        <label>Nationality <span>*</span></label>
                        <input type="text">
                    </div>

                    <div class="field">
                        <label>Do you want more info of GCTM? <span>*</span></label>
                        <select>
                            <option>-- Select Category --</option> 
                            <option>Yes</option>
                            <option>No</option>
                        </select>
                    </div>

                </div>

                <div class="row">

                    <div class="field">
                        <label>Do you require Hostel Accommodation? <span>*</span></label>
                        <select>
                            <option>-- Select Category --</option> 
                            <option>Yes</option>
                            <option>No</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Student Signature <span>*</span></label>
                        <input type="file">
                    </div>

                </div>

                <div class="row">

                    <div class="field">
                        <label>Student Photo <span>*</span></label>
                        <input type="file">
                    </div>

                    <div class="field empty"></div>

                </div>

                <div class="submit-box">
                    <button type="submit">
                        Submit Admission Form
                    </button>
                </div>

            </div>

        </form>

    </div>

</body>

</html>
