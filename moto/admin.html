<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | Moto Hub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
  <style>
    body { background: #0f1117; color: #fff; font-family: Arial, sans-serif; }
    .card { background: #151922; border: 1px solid #2a3040; border-radius: 12px; }
    .nav-link { color: #fff; }
    .nav-link.active { background: #ff3b30; border-radius: 8px; }
    .badge { font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="container py-5">
    <h2 class="mb-4">Moto Hub Admin Panel</h2>
    <p class="text-muted">Manage recent orders, inquiries, and service bookings.</p>

    <ul class="nav nav-pills mb-4">
      <li class="nav-item"><a class="nav-link active" href="#orders" data-toggle="pill">Orders</a></li>
      <li class="nav-item"><a class="nav-link" href="#inquiries" data-toggle="pill">Inquiries</a></li>
      <li class="nav-item"><a class="nav-link" href="#bookings" data-toggle="pill">Bookings</a></li>
    </ul>

    <div class="tab-content">
      <div class="tab-pane fade show active" id="orders">
        <div class="card p-3">
          <h5>Recent Orders</h5>
          <div id="ordersList"></div>
        </div>
      </div>
      <div class="tab-pane fade" id="inquiries">
        <div class="card p-3">
          <h5>Customer Inquiries</h5>
          <div id="inquiriesList"></div>
        </div>
      </div>
      <div class="tab-pane fade" id="bookings">
        <div class="card p-3">
          <h5>Garage Bookings</h5>
          <div id="bookingsList"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function getStoredData(key) {
      return JSON.parse(localStorage.getItem(key) || '[]');
    }

    function saveStoredData(key, data) {
      localStorage.setItem(key, JSON.stringify(data));
    }

    function renderSection(containerId, items, renderer, emptyText) {
      document.getElementById(containerId).innerHTML = items.length ? items.map(renderer).join('') : `<p class="text-muted">${emptyText}</p>`;
    }

    function loadAdminData() {
      const orders = getStoredData('motoOrders');
      const inquiries = getStoredData('motoInquiries');
      const bookings = getStoredData('motoBookings');

      renderSection('ordersList', orders, order => `
        <div class="border-bottom py-3">
          <div class="d-flex justify-content-between"><strong>${order.customerName || 'Guest'}</strong><span class="badge badge-warning">${order.status || 'Pending'}</span></div>
          <div class="small text-muted">${order.email || ''} • ${order.phone || ''}</div>
          <div class="small">Items: ${order.items?.length || 0} • Total: ₹${(order.total || 0).toLocaleString('en-IN')}</div>
          <div class="mt-2">
            <button class="btn btn-sm btn-outline-light" onclick="updateStatus('${order.id}', 'Confirmed')">Confirm</button>
            <button class="btn btn-sm btn-outline-light" onclick="updateStatus('${order.id}', 'Shipped')">Ship</button>
          </div>
        </div>
      `, 'No orders yet.');

      renderSection('inquiriesList', inquiries, item => `
        <div class="border-bottom py-3">
          <strong>${item.name}</strong>
          <div class="small text-muted">${item.email} • ${item.subject}</div>
          <div class="small">${item.message}</div>
        </div>
      `, 'No inquiries yet.');

      renderSection('bookingsList', bookings, item => `
        <div class="border-bottom py-3">
          <strong>${item.name}</strong>
          <div class="small text-muted">${item.email} • ${item.phone}</div>
          <div class="small">Service: ${item.service}</div>
          <div class="small">Notes: ${item.notes}</div>
        </div>
      `, 'No bookings yet.');
    }

    function updateStatus(id, status) {
      const orders = getStoredData('motoOrders');
      const updated = orders.map(order => order.id === id ? { ...order, status } : order);
      saveStoredData('motoOrders', updated);
      loadAdminData();
    }

    window.addEventListener('DOMContentLoaded', loadAdminData);
  </script>
    <script src="js/layout.js"></script></body>
</html>
