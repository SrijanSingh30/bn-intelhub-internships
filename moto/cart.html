<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Moto Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="Shop.css">
    <style>
        body {
            background: #0f1117;
            color: #fff;
        }
        .cart-page {
            padding: 80px 20px 40px;
        }
        .cart-card {
            background: #151922;
            border: 1px solid #252a35;
            border-radius: 12px;
            padding: 20px;
        }
        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #252a35;
            padding: 15px 0;
            gap: 15px;
        }
        .cart-item img {
            width: 90px;
            height: 90px;
            object-fit: contain;
            border-radius: 8px;
        }
        .empty-cart {
            text-align: center;
            padding: 40px 20px;
            color: #aaa;
        }
        .checkout-btn {
            background: #ff3b30;
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body id="top">
    <div class="top-header fixed-top">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-lg-4 col-md-4 d-flex left-info">
                    <a href="tel:+919876543210"><i class="fa fa-phone"></i> +91 9876543210</a>
                    <a href="mailto:support@ridexgarage.com"><i class="fa fa-envelope"></i> support@ridexgarage.com</a>
                </div>
                <div class="col-lg-4 col-md-4 text-center shipping-text">
                    Free Shipping on orders above ₹999
                </div>
                <div class="col-lg-4 col-md-4 text-right right-info">
                    <a href="shop.html#products"><i class="fa fa-map-marker"></i> Track Order</a>
                    <a href="login.html"><i class="fa fa-user"></i> Login </a>
                    <a href="register.html"><i class="fa fa-user"></i>Register</a>
                </div>
            </div>
        </div>
    </div>
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="images/logo.png" alt="Moto Hub Logo">
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarMenu" aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">HOME</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">ABOUT US</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html">SHOP</a></li>
                    <li class="nav-item"><a class="nav-link" href="parts.html">PARTS</a></li>
                    <li class="nav-item"><a class="nav-link" href="accessories.html">ACCESSORIES</a></li>
                    <li class="nav-item"><a class="nav-link" href="brands.html">BRANDS</a></li>
                    <li class="nav-item"><a class="nav-link" href="garage.html">GARAGE</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">CONTACT</a></li>
                </ul>
                <div class="header-icons">
                    <a href="shop.html#products">
                        <i class="fa fa-search"></i>
                    </a>
                    <a href="shop.html#products" class="icon-box">
                        <i class="fa fa-heart-o"></i>
                        <span class="badge-count">0</span>
                    </a>
                    <a href="cart.html" class="icon-box">
                        <i class="fa fa-shopping-bag"></i>
                        <span class="badge-count" id="cartCount">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container cart-page">
        <button type="button" class="btn btn-outline-light mb-4" onclick="window.history.back()">
            <i class="fa fa-arrow-left"></i> Back
        </button>
        <div class="row">
            <div class="col-lg-8">
                <div class="cart-card">
                    <h3 class="mb-4">Your Cart</h3>
                    <div id="cartItems"></div>
                </div>
            </div>
            <div class="col-lg-4 mt-4 mt-lg-0">
                <div class="cart-card">
                    <h4>Order Summary</h4>
                    <div class="d-flex justify-content-between mt-3">
                        <span>Items</span>
                        <strong id="cartItemCount">0</strong>
                    </div>
                    <div class="d-flex justify-content-between mt-2">
                        <span>Subtotal</span>
                        <strong id="cartSubtotal">₹0</strong>
                    </div>
                    <hr class="border-secondary">
                    <form id="checkoutForm" class="mt-3">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" class="form-control" name="customerName" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" class="form-control" name="phone" required>
                        </div>
                        <div class="form-group">
                            <label>Delivery Address</label>
                            <textarea class="form-control" name="address" rows="3" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Notes</label>
                            <textarea class="form-control" name="note" rows="2"></textarea>
                        </div>
                        <div id="checkoutMessage" class="small mb-2"></div>
                        <button class="checkout-btn btn btn-block mt-2" type="submit">Place Order</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const cartItemsContainer = document.getElementById('cartItems');
        const cartItemCount = document.getElementById('cartItemCount');
        const cartSubtotal = document.getElementById('cartSubtotal');
        const checkoutForm = document.getElementById('checkoutForm');
        const checkoutMessage = document.getElementById('checkoutMessage');

        function getCart() {
            return JSON.parse(localStorage.getItem('motoCart') || '[]');
        }

        function updateCartBadge() {
            const count = getCart().reduce((sum, item) => sum + (item.quantity || 1), 0);
            document.querySelectorAll('.badge-count, [data-cart-count]').forEach((badge) => {
                badge.textContent = count;
            });
        }

        function renderCart() {
            const cart = getCart();
            if (!cart.length) {
                cartItemsContainer.innerHTML = '<div class="empty-cart">Your cart is empty. Add some products from the shop.</div>';
                cartItemCount.textContent = '0';
                cartSubtotal.textContent = '₹0';
                updateCartBadge();
                return;
            }

            const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            cartItemCount.textContent = totalItems;
            const subtotal = cart.reduce((sum, item) => sum + item.price * (item.quantity || 1), 0);
            cartSubtotal.textContent = `₹${subtotal.toLocaleString('en-IN')}`;

            cartItemsContainer.innerHTML = cart.map((item, index) => `
                <div class="cart-item" data-index="${index}">
                    <div class="d-flex align-items-center">
                        <img src="${item.image}" alt="${item.name}">
                        <div class="ml-3">
                            <h6>${item.name}</h6>
                            <p class="mb-0 text-muted">₹${item.price.toLocaleString('en-IN')}</p>
                            <p class="mb-0 text-muted">Qty: ${item.quantity || 1}</p>
                        </div>
                    </div>
                    <button class="btn btn-sm btn-outline-light remove-btn" type="button" data-index="${index}">Remove</button>
                </div>
            `).join('');

            updateCartBadge();
        }

        function removeFromCart(index) {
            const cart = getCart();
            if (index < 0 || index >= cart.length) return;
            cart.splice(index, 1);
            localStorage.setItem('motoCart', JSON.stringify(cart));
            renderCart();
        }

        cartItemsContainer.addEventListener('click', (event) => {
            const button = event.target.closest('.remove-btn');
            if (!button) return;
            const index = Number(button.dataset.index);
            if (Number.isNaN(index)) return;
            removeFromCart(index);
        });

        checkoutForm.addEventListener('submit', (event) => {
            event.preventDefault();
            const cart = getCart();
            if (!cart.length) {
                checkoutMessage.textContent = 'Your cart is empty.';
                checkoutMessage.style.color = '#ff8a80';
                return;
            }

            const formData = new FormData(checkoutForm);
            const payload = {
                id: Date.now().toString(),
                customerName: formData.get('customerName')?.toString().trim(),
                email: formData.get('email')?.toString().trim(),
                phone: formData.get('phone')?.toString().trim(),
                address: formData.get('address')?.toString().trim(),
                note: formData.get('note')?.toString().trim(),
                items: cart,
                total: cart.reduce((sum, item) => sum + item.price * (item.quantity || 1), 0),
                status: 'Pending',
                createdAt: new Date().toISOString()
            };

            checkoutMessage.textContent = 'Placing your order...';
            checkoutMessage.style.color = '#ffd54f';

            try {
                const orders = JSON.parse(localStorage.getItem('motoOrders') || '[]');
                localStorage.setItem('motoOrders', JSON.stringify([payload, ...orders]));
                localStorage.removeItem('motoCart');
                checkoutForm.reset();
                renderCart();
                checkoutMessage.textContent = 'Order placed successfully. Our team will contact you shortly.';
                checkoutMessage.style.color = '#81c784';
            } catch (error) {
                checkoutMessage.textContent = 'Order could not be placed right now. Please try again.';
                checkoutMessage.style.color = '#ff8a80';
            }
        });

        window.addEventListener('DOMContentLoaded', renderCart);
    </script>
    <script src="js/layout.js"></script></body>
</html>
