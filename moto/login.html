<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Moto Hub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f1117, #1a1f2b);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .auth-card {
      width: min(100%, 440px);
      background: rgba(21, 25, 34, 0.96);
      border: 1px solid #2c3444;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.25);
    }
    .auth-card h2 { margin-bottom: 8px; }
    .auth-card p { color: #b4bccd; }
    .form-group { margin-bottom: 14px; }
    .form-control { background: #0f1117; color: #fff; border: 1px solid #3a4355; }
    .form-control:focus { background: #0f1117; color: #fff; border-color: #ff3b30; box-shadow: none; }
    .btn-primary { background: #ff3b30; border: none; width: 100%; }
    .btn-primary:hover { background: #e62d22; }
    .auth-links { margin-top: 14px; font-size: 0.95rem; }
    .auth-links a { color: #ff8a80; }
    .message { margin-top: 10px; min-height: 20px; font-size: 0.95rem; }
    .message.error { color: #ff8a80; }
    .message.success { color: #81c784; }
  </style>
</head>
<body>
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p>Sign in to continue shopping at Moto Hub.</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" class="form-control" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" class="form-control" required />
      </div>
      <button class="btn btn-primary" type="submit">Login</button>
    </form>
    <div id="message" class="message"></div>
    <div class="auth-links">
      <span>New here?</span> <a href="register.html">Create an account</a>
    </div>
    <div class="auth-links">
      <a href="index.html">Back to Home</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const message = document.getElementById('message');

    function getUsers() {
      return JSON.parse(localStorage.getItem('motoUsers') || '[]');
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const users = getUsers();
      const user = users.find(u => u.email === email && u.password === password);

      message.textContent = 'Signing you in...';
      message.className = 'message';

      if (!user) {
        message.textContent = 'Invalid email or password.';
        message.className = 'message error';
        return;
      }

      localStorage.setItem('motoAuthToken', 'static-token');
      localStorage.setItem('motoAuthUser', JSON.stringify({ name: user.name, email: user.email }));
      message.textContent = 'Login successful! Redirecting...';
      message.className = 'message success';
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 700);
    });
  </script>
    <script src="js/layout.js"></script></body>
</html>
