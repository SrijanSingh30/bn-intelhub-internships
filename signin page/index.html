<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <h2 class="fw-bold mb-2">Sign In</h2>
        <p class="text-muted mb-4">Please enter your details.</p>

        <form>
            <div class="mb-3">
                <label class="form-label fw-semibold">Email address</label>

                <div class="position-relative">
                    <input type="email"
                        class="form-control custom-input">
                  </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password"
                    class="form-control custom-input" >
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label small">
                        Remember me
                    </label>
                </div>

                <a href="forgot.html" class="forgot-link">Forgotten Password?</a>
            </div>

            <button type="submit" class="btn btn-primary sign-btn">
                Sign in
            </button>

            <button type="button" class="social-btn mt-3">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="">
            <a href="#">Sign in with  google</a>
            </button>

            <button type="button" class="social-btn mt-3">
                <i class="bi bi-apple apple-icon"></i>
                 <a href="#">Sign in with Apple</a>
            </button>

            <p class="signup-text">
                Dont have an account?
                <a href="signup.html">Sign up</a>
            </p>

        </form>

    </div>
</div>

</body>
</html>
