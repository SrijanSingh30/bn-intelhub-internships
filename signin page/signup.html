<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

   
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="signup.css">
</head>

<body>

    <div class="signup-container">
        <div class="signup-card">

            <h2>Sign Up</h2>
            <p class="subtitle">Please provide your details</p>

           
            <button class="social-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="">
               <a href="#">Sign in with google</a>
            </button>

            <button class="social-btn mt-3">
                <i class="bi bi-apple apple-icon"></i>
                 <a href="#">Sign in with Apple</a>
            </button>

            
            <div class="or-divider">
                <span></span>
                <p>OR</p>
                <span></span>
            </div>

            <div class="mb-3">
                <label class="form-label">Email address</label>

                <div class="position-relative">
                    <input type="email" class="form-control custom-input" >

                    
                </div>
            </div>

            
            <div class="mb-2">
                <label class="form-label">Password</label>
                <input type="password" class="form-control custom-input" >
            </div>

            <!-- Password Strength
            <div class="strength-bars">
                <div class="bar active"></div>
                <div class="bar active"></div>
                <div class="bar active"></div>
            </div>-->

          
            <div class="mb-4">
                <label class="form-label">Repeat Password</label>
                <input type="password" class="form-control custom-input">
            </div>

          
            <button class="btn continue-btn">
                Continue
            </button>

            <p class="bottom-text">
                Dont have an account?
                <a href="index.html">Sign in</a>
            </p>

        </div>
    </div>

</body>

</html>
