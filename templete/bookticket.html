<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book Ticket</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="bookticket.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-black">
        <div class="container">

            <a class="navbar-brand text-danger fw-bold" href="#">
                <i class="fa-solid fa-film"></i> Cineplex
            </a>

            <a href="index.html" class="btn btn-outline-danger">
                Back Home
            </a>

        </div>
    </nav>

    <!-- Page Heading -->

    <section class="booking-header text-center">

        <div class="container">

            <h1>Book Your Movie Ticket</h1>

            <p>Select movie, showtime and seats</p>

        </div>

    </section>

    <!-- Booking Form -->

    <section class="py-5">

        <div class="container">

            <div class="row g-4">

                <!-- Left Side -->

                <div class="col-lg-8">

                    <div class="booking-card">

                        <h3 class="mb-4">Ticket Details</h3>

                        <form>

                            <!-- Movie -->

                            <div class="mb-3">
                                <label class="form-label">Select Movie</label>

                                <select class="form-select">
                                    <option></option>
                                    <option>Dhurandhar</option>
                                    <option>Welcome To The Jungle</option>
                                    <option>KGF Chapter 2</option>
                                    <option>Salar</option>

                                </select>
                            </div>

                            <!-- Date -->

                            <div class="mb-3">
                                <label class="form-label">Select Date</label>

                                <input type="date" class="form-control">
                            </div>

                            <!-- Time -->

                            <div class="mb-3">

                                <label class="form-label">
                                    Showtime
                                </label>

                                <select class="form-select">
                                    <option></option>
                                    <option>10:00 AM</option>
                                    <option>1:00 PM</option>
                                    <option>4:00 PM</option>
                                    <option>7:00 PM</option>
                                    <option>10:00 PM</option>
                                </select>

                            </div>

                            <!-- Seats -->

                            <div class="mb-3">

                                <label class="form-label">
                                    Seat Number
                                </label>

                                <input type="text" class="form-control" placeholder="A1, A2">

                            </div>

                            <!-- Quantity -->

                            <div class="mb-3">

                                <label class="form-label">
                                    Number of Tickets
                                </label>

                                <input type="number" class="form-control" min="1" max="10">

                            </div>

                            <!-- Name -->

                            <div class="mb-3">

                                <label class="form-label">
                                    Full Name
                                </label>

                                <input type="text" class="form-control" placeholder="Enter your name">

                            </div>

                            <!-- Email -->

                            <div class="mb-3">

                                <label class="form-label">
                                    Email Address
                                </label>

                                <input type="email" class="form-control" placeholder="Enter email">

                            </div>

                            <!-- Phone -->

                            <div class="mb-3">

                                <label class="form-label">
                                    Phone Number
                                </label>

                                <input type="tel" maxlength="10" class="form-control" placeholder="Enter phone number">

                            </div>

                        </form>

                    </div>

                </div>

                <!-- Right Side -->

                <div class="col-lg-4">

                    <div class="summary-card">

                        <h3>Booking Summary</h3>

                        <hr>


                        <p>
                            <strong>Date :</strong>
                            20 June 2026
                        </p>

                        <p>
                            <strong>Time :</strong>
                            7:00 PM
                        </p>

                        <p>
                            <strong>Seats :</strong>
                            A1, A2
                        </p>

                        <p>
                            <strong>Tickets :</strong>
                            2
                        </p>
                        <p>
                            <strong>Movie :</strong>
                            
                        </p>


                        <hr>

                        <h4 class="text-danger">
                            Total : ₹500
                        </h4>

                       <a href="index.html" class="btn btn-danger px-4">
                            Back To Home
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
