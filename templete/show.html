<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showtimes - CinemaHall</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="show.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-black">
        <div class="container">

            <a class="navbar-brand text-danger fw-bold" href="#">
                <i class="fa-solid fa-film"></i> Cineplex
            </a>

            <a href="index.html" class="btn btn-outline-danger">
                Back Home
            </a>

        </div>
    </nav>

    <!-- Hero -->

    <section class="hero">
        <div class="container text-center">

            <h1>Movie Showtimes</h1>

            <p>
                Choose your preferred movie and show timing
            </p>

        </div>
    </section>

    <!-- Showtimes -->

    <section class="py-5">

        <div class="container">

            <div class="row g-4">

                <!-- Movie 1 -->

                <div class="col-md-6 col-lg-4">

                    <div class="show-card">

                        <img src="img/dhurandhr.jpeg" alt="">

                        <div class="p-3">

                            <h4>Dhurandhr</h4>

                            <p>Biography, Drama, History</p>

                            <div class="time-btns">
                                <button class="btn btn-outline-danger">10:00 AM</button>
                                <button class="btn btn-outline-danger">2:00 PM</button>
                                <button class="btn btn-outline-danger">7:00 PM</button>
                            </div>

                        </div>

                    </div>

                </div>

                <!-- Movie 2 -->

                <div class="col-md-6 col-lg-4">

                    <div class="show-card">

                        <img src="img/kgf2.jpeg" alt="">

                        <div class="p-3">

                            <h4>K G F 2</h4>

                            <p>Action, Adventure, Sci-Fi</p>

                            <div class="time-btns">
                                <button class="btn btn-outline-danger">11:00 AM</button>
                                <button class="btn btn-outline-danger">3:00 PM</button>
                                <button class="btn btn-outline-danger">8:00 PM</button>
                            </div>

                        </div>

                    </div>

                </div>

                <!-- Movie 3 -->

                <div class="col-md-6 col-lg-4">

                    <div class="show-card">

                        <img src="img/welcometojungle.jpeg" alt="">

                        <div class="p-3">

                            <h4>Wellcome To Jungle</h4>

                            <p>Adventure, Fantasy</p>

                            <div class="time-btns">
                                <button class="btn btn-outline-danger">9:00 AM</button>
                                <button class="btn btn-outline-danger">1:00 PM</button>
                                <button class="btn btn-outline-danger">6:00 PM</button>
                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
